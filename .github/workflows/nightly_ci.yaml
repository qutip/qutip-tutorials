name: Nightly build

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * *'

defaults:
  run:
    shell: bash -l {0}

jobs:
  pytests:
    name: pytests (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: 'v4-release'
            qutip-version: '4'
            qutip-install-spec: 'qutip==4.7.*'
            qip-install-spec: 'qutip-qip==0.4.*'
          - label: 'v5-release'
            qutip-version: '5'
            qutip-install-spec: 'qutip'
            qip-install-spec: 'qutip-qip'
          - label: 'v5-master'
            qutip-version: '5'
            qutip-install-spec: 'git+https://github.com/qutip/qutip@master'
            qip-install-spec: 'git+https://github.com/qutip/qutip-qip@master'
  
    steps:
    - uses: actions/checkout@v4

    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        activate-environment: test-environment-v${{ matrix.qutip-version }}

    - name: Get Date
      id: get-date
      run: echo "::set-output name=today::$(/bin/date -u '+%Y%m%d')"
      shell: bash

    - name: Cache Conda env
      uses: actions/cache@v3
      with:
        path: ${{ env.CONDA }}/envs
        key: conda-${{ runner.os }}--${{ runner.arch }}--${{ steps.get-date.outputs.today }}-${{ hashFiles(format('test_environment-v{0}.yml', matrix.qutip-version)) }}-${{ env.CACHE_NUMBER }}-${{ matrix.label }}
      env:
        # Increase this value to reset cache if etc/example-environment.yml has not changed
        CACHE_NUMBER: 0
      id: cache

    - name: Install environment
      if: steps.cache.outputs.cache-hit != 'true'
      run: conda env update -n test-environment-v${{ matrix.qutip-version }} -f test_environment-v${{ matrix.qutip-version }}.yml

    - name: Install QuTiP
      run: |
        pip install --upgrade pip
        python -m pip install jax jax[cpu] equinox diffrax
        python -m pip install "${{ matrix.qutip-install-spec }}"
        python -m pip install "${{ matrix.qip-install-spec }}"
        python -m pip install --no-deps git+https://github.com/qutip/qutip-jax
        python -m pip install --no-deps git+https://github.com/qutip/qutip-qtrl
        python -m pip install --no-deps git+https://github.com/qutip/qutip-qoc

    - name: Install ffmpeg & LaTeX
      run: |
        sudo apt update
        sudo apt install ffmpeg
        sudo apt install texlive-latex-extra

    - name: Show environment
      run: conda list

    - name: Convert Notebooks
      run: |
        rm -rf notebooks
        mkdir notebooks
        cp -r tutorials-v${{ matrix.qutip-version }}/* notebooks
        cd notebooks
        find . -name '*.md' -exec jupytext --to notebook {} +
        find . -name '*.md' -delete

    - name: Remove cuQuantum notebook from tests
      # Without GPU, this notebook can't be ran.
      if:  ${{ matrix.qutip-version == '5' }}
      run: rm notebooks/miscellaneous/cuQuantum_backend.ipynb

    - name: Check PEP8 formatting
      run: |
        pip install nbqa flake8
        find . -name '*.ipynb' -exec nbqa flake8 --max-line-length=88 {} +

    - name: Run tests
      run: |
        jupyter kernel &
        cd notebooks
        find . -name '*.ipynb' -exec pytest --nbmake --overwrite --nbmake-timeout=900 {} +
        rm template.ipynb

    - name: Copy cuQuantum notebook
      # Without GPU, this notebook can't be ran.
      # Copy the already executed notebook after the tests.
      if:  ${{ matrix.qutip-version == '5' }}
      run: cp tutorials-v5/miscellaneous/cuQuantum_backend.ipynb notebooks/miscellaneous/

    - name: Create Notebook Artifact
      uses: actions/upload-artifact@v4
      with:
        name: executed-notebooks-${{ matrix.label }}
        path: |
          notebooks/*.ipynb
          notebooks/**/*.ipynb

  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tcort/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          folder-path: 'tutorials-v4, tutorials-v5'
          #use config file to define 403 and 405 errors as valid links
          #(APS blocks this link check)
          config-file: mlc_config.json


  finalise:
    needs: pytests
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Open Issue on Failure
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [[ -z "${{ inputs.open_issue }}" ]] || [[ "${{ inputs.open_issue }}" != "False" ]];
          then
            pip install requests
            python tools/report_failing_tests.py $GITHUB_TOKEN
          fi
